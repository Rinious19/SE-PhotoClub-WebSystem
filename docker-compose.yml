# docker-compose.yml — PhotoClub WebSystem
# ใช้สำหรับ Dev environment: MySQL + Backend + Frontend

services:

  db:
    image: mysql:8.0
    container_name: photoclub_db
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "--password=${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  backend:
    #* สำหรับ Build จากโค้ดที่แก้ไขเอง (ไม่ได้ Pull จาก Registry)
    # build:
    #   context: ./backend
    #   dockerfile: Dockerfile
    image: rinious19/photoclub-backend
    container_name: photoclub_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    ports:
      - "5000:5000"
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    #* สำหรับ Build จากโค้ดที่แก้ไขเอง (ไม่ได้ Pull จาก Registry)
    # build:
    #   context: ./frontend
    #   dockerfile: Dockerfile
    image: rinious19/photoclub-frontend
    container_name: photoclub_frontend
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - ./frontend/.env
    ports:
      - "3000:80"

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: photoclub_phpmyadmin
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    ports:
      - "8080:80"

volumes:
  db_data: